<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sosan — do Piemontu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --text: #e8e2d9;
      --accent: #c8622a;
      --muted: #5a5650;
      --line: #2a2620;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
    }

    .scene {
      display: flex;
      flex-direction: row;
      width: 100vw;
      height: 100vh;
    }

    /* LEFT — photo */
    .photo-col {
      flex: 1 1 auto;
      min-width: 0;
      max-width: calc(100vw - 380px);
      position: relative;
      overflow: hidden;
    }

    .photo-col img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      animation: zoomin 24s ease-in-out infinite alternate;
    }

    .photo-col::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, transparent 40%, #0a0a0a 90%);
      pointer-events: none;
    }

    @keyframes zoomin {
      from { transform: scale(1); }
      to   { transform: scale(1.06); }
    }

    /* RIGHT — panel */
    .panel {
      flex: 0 0 380px;
      width: 380px;
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      padding: 48px 40px;
      position: relative;
      background: var(--bg);
      z-index: 10;
    }

    .panel::before {
      content: '';
      position: absolute;
      left: 0; top: 15%; height: 70%; width: 1px;
      background: var(--accent);
      opacity: 0;
      animation: fadein .4s ease 1s forwards;
    }

    .fomo-tag {
      align-self: flex-end;
      font-size: 9px;
      letter-spacing: .15em;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 4px 10px;
      margin-bottom: 40px;
      opacity: 0;
      animation: fadein .6s ease 2.4s forwards;
    }

    .label {
      font-size: 10px;
      letter-spacing: .2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 28px;
      opacity: 0;
      animation: slideup .5s ease .4s forwards;
    }

    .greeting {
      font-family: 'Playfair Display', serif;
      font-size: 38px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 8px;
      opacity: 0;
      animation: slideup .5s ease .6s forwards;
    }

    .invite {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-style: italic;
      color: #b0a898;
      line-height: 1.6;
      margin-bottom: 4px;
      opacity: 0;
      animation: slideup .5s ease .8s forwards;
    }

    .destination {
      font-family: 'Playfair Display', serif;
      font-size: 30px;
      font-style: italic;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 40px;
      opacity: 0;
      animation: slideup .5s ease 1s forwards;
    }

    .divider {
      width: 40px; height: 1px;
      background: var(--line);
      margin-bottom: 28px;
      opacity: 0;
      animation: fadein .4s ease 1.2s forwards;
    }

    .coords {
      font-size: 10px;
      letter-spacing: .12em;
      color: var(--muted);
      opacity: 0;
      animation: fadein .4s ease 1.4s forwards;
    }

    .spacer { flex: 1; min-height: 24px; }

    /* AUDIO */
    .audio-wrap {
      padding-top: 32px;
      opacity: 0;
      animation: fadein .6s ease 1.8s forwards;
    }

    .now-playing {
      font-size: 9px;
      letter-spacing: .2em;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .player-bar {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #play-btn {
      width: 36px; height: 36px;
      flex-shrink: 0;
      border: 1px solid var(--accent);
      background: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s;
    }
    #play-btn:hover { background: rgba(200,98,42,.15); }
    #play-btn svg { fill: var(--accent); }

    .progress-wrap {
      flex: 1;
      height: 2px;
      background: var(--line);
      cursor: pointer;
    }
    #progress-bar {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width .1s linear;
    }

    .time {
      font-size: 10px;
      color: var(--muted);
      min-width: 34px;
      text-align: right;
    }

    .song-title {
      font-size: 10px;
      color: var(--muted);
      margin-top: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* BOTTOM NOTE */
    .bottom-note {
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid var(--line);
      opacity: 0;
      animation: fadein .6s ease 2.2s forwards;
    }

    .bottom-note p {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.7;
    }
    .bottom-note strong { color: var(--accent); }

    @keyframes fadein {
      from { opacity: 0; } to { opacity: 1; }
    }
    @keyframes slideup {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* MOBILE */
    @media (max-width: 680px) {
      html, body { overflow-y: auto; }
      .scene { flex-direction: column; height: auto; min-height: 100vh; }
      .photo-col { flex: none; height: 60vw; min-height: 200px; }
      .photo-col::after {
        background: linear-gradient(to bottom, transparent 50%, #0a0a0a 100%);
      }
      .panel {
        flex: none; width: 100%; height: auto;
        overflow-y: visible; padding: 32px 24px 48px;
      }
      .panel::before { display: none; }
      .greeting { font-size: 28px; }
      .destination { font-size: 22px; }
    }
  </style>
</head>
<body>

<div class="scene">

  <div class="photo-col">
    <img src="obrazek.jpg" alt="Mariachi v horách">
  </div>

  <div class="panel">
    <span class="fomo-tag">SOSAN_FOMO_LEVEL: 99.7%</span>

    <p class="label">Pozvánka — 2025</p>
    <h1 class="greeting">Milý Sosane,</h1>
    <p class="invite">prokážeš nám tu čest<br>a pojedeš s námi</p>
    <p class="destination">do Piemontu?</p>

    <div class="divider"></div>
    <p class="coords">47.4°N, 8.1°E → Piedmont, Italia</p>

    <div class="spacer"></div>

    <div class="audio-wrap">
      <p class="now-playing">♩ ♫ ♩</p>
      <div class="player-bar">
        <button id="play-btn" aria-label="Přehrát / Pozastavit">
          <svg id="icon-play" width="13" height="13" viewBox="0 0 14 14"><polygon points="3,1 13,7 3,13"/></svg>
          <svg id="icon-pause" width="13" height="13" viewBox="0 0 14 14" style="display:none"><rect x="2" y="1" width="4" height="12"/><rect x="8" y="1" width="4" height="12"/></svg>
        </button>
        <div class="progress-wrap" id="progress-wrap">
          <div id="progress-bar"></div>
        </div>
        <span class="time" id="time-display">0:00</span>
      </div>
      <p class="song-title">Ay, ay, ay, ay — Sosan don't you cry</p>
    </div>

    <div class="bottom-note">
      <p><em>Ay ay ay, Sosan don't you cry!</em><br>
      The granite awaits and<br>
      <strong>the river runs high.</strong></p>
    </div>
  </div>
</div>

<audio id="audio" src="pisnicka.mp3" preload="auto"></audio>

<script>
  const audio = document.getElementById('audio');
  const playBtn = document.getElementById('play-btn');
  const iconPlay = document.getElementById('icon-play');
  const iconPause = document.getElementById('icon-pause');
  const progressBar = document.getElementById('progress-bar');
  const progressWrap = document.getElementById('progress-wrap');
  const timeDisplay = document.getElementById('time-display');

  function fmt(s) {
    return Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0');
  }
  function setPlaying(on) {
    iconPlay.style.display = on ? 'none' : 'block';
    iconPause.style.display = on ? 'block' : 'none';
  }

  setTimeout(() => {
    audio.play().then(() => setPlaying(true)).catch(() => {});
  }, 2600);

  playBtn.addEventListener('click', () => {
    if (audio.paused) { audio.play(); setPlaying(true); }
    else { audio.pause(); setPlaying(false); }
  });

  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    progressBar.style.width = (audio.currentTime / audio.duration * 100) + '%';
    timeDisplay.textContent = fmt(audio.currentTime);
  });

  progressWrap.addEventListener('click', e => {
    const r = progressWrap.getBoundingClientRect();
    audio.currentTime = (e.clientX - r.left) / r.width * audio.duration;
  });

  audio.addEventListener('ended', () => setPlaying(false));
</script>
</body>
</html>
